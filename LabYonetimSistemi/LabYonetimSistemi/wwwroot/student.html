<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>LRP | Öğrenci Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #2c3e50;
            position: fixed;
            color: white;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
            background: #f4f7f6;
            min-height: 100vh;
        }

        .nav-link {
            color: #bdc3c7;
            cursor: pointer;
        }

            .nav-link:hover {
                color: white;
                background: #34495e;
            }

        .pc-card {
            border-left: 5px solid #3498db;
        }
    </style>
</head>
<body>
    <div class="sidebar p-3">
        <h4><i class="fas fa-user-graduate me-2"></i>Öğrenci Paneli</h4>
        <hr>
        <ul class="nav flex-column gap-2">
            <li class="nav-item"><a class="nav-link active"><i class="fas fa-laptop me-2"></i>Bilgisayarım</a></li>
            <li class="nav-item mt-5">
                <a class="nav-link text-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-2"></i>Çıkış Yap
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container">
            <h2 class="mb-4">Zimmetli Bilgisayar Bilgileri</h2>
            <div id="pc-info" class="row">
                <div class="text-center mt-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p>Bilgileriniz getiriliyor...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde yetki kontrolü yap ve verileri çek
        window.onload = async () => {
            const role = localStorage.getItem("userRole");
            const username = localStorage.getItem("username");

            if (role !== "Student" || !username) {
                location.href = "/login.html";
                return;
            }

            try {
                // Öğrencinin bilgisayar bilgilerini API'den çek
                const res = await fetch(`/api/ogrenci/bilgisayarim/${username}`);
                if (!res.ok) throw new Error("Bilgisayar bulunamadı.");

                const pc = await res.json();
                renderPC(pc);
            } catch (err) {
                document.getElementById("pc-info").innerHTML = `
                    <div class="alert alert-warning">Henüz size atanmış bir bilgisayar bulunamadı.</div>`;
            }
        };

        function renderPC(pc) {
            document.getElementById("pc-info").innerHTML = `
                <div class="col-md-8">
                    <div class="card shadow-sm pc-card">
                        <div class="card-body">
                            <h5 class="card-title text-primary mb-4">
                                <i class="fas fa-desktop me-2"></i>${pc.assetCode}
                            </h5>
                            <div class="row">
                                <div class="col-6 mb-3"><strong>Marka:</strong> ${pc.brand}</div>
                                <div class="col-6 mb-3"><strong>İşlemci:</strong> ${pc.processor}</div>
                                <div class="col-6 mb-3"><strong>RAM:</strong> ${pc.ram} GB</div>
                                <div class="col-6 mb-3"><strong>İşletim Sistemi:</strong> ${pc.os || 'Windows 11'}</div>
                            </div>
                            <hr>
                            <h6>Donanım Özellikleri</h6>
                            <div class="d-flex gap-3">
                                <span class="badge ${pc.hasHdmi ? 'bg-success' : 'bg-secondary'}">HDMI</span>
                                <span class="badge ${pc.hasVeyon ? 'bg-success' : 'bg-secondary'}">Veyon</span>
                                <span class="badge ${pc.hasInternet ? 'bg-success' : 'bg-secondary'}">İnternet</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function logout() {
            localStorage.clear();
            location.href = "/login.html";
        }
    </script>
</body>
</html>
