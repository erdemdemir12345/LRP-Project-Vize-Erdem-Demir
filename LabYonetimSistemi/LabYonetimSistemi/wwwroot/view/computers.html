<div class="mb-4">
    <h3 class="fw-bold"><i class="fas fa-desktop me-2 text-success"></i>Bilgisayar Envanteri</h3>
    <p class="text-muted">Laboratuvarlara yeni donanım ekleyebilir ve RAM bilgilerini güncelleyebilirsiniz.</p>
</div>

<div class="card border-0 shadow-sm mb-4">
    <div class="card-body p-4">
        <div class="row g-3">
            <div class="col-md-2">
                <label class="form-label small fw-bold text-secondary">Laboratuvar</label>
                <select id="labSelect" class="form-select border-0 bg-light">
                    <option value="">Yükleniyor...</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold text-secondary">Marka / Model</label>
                <input type="text" id="pcBrand" class="form-control border-0 bg-light" placeholder="Örn: HP ProDesk">
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold text-secondary">İşlemci</label>
                <input type="text" id="pcCpu" class="form-control border-0 bg-light" placeholder="i7-13700">
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold text-secondary">RAM (GB)</label>
                <input type="number" id="pcRam" class="form-control border-0 bg-light" placeholder="16" min="1">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-success w-100 shadow-sm fw-bold" onclick="addComputer()">
                    <i class="fas fa-plus me-2"></i>PC Ekle
                </button>
            </div>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead class="bg-light">
                <tr>
                    <th class="ps-4">Demirbaş Kodu</th>
                    <th>Marka / Model</th>
                    <th>İşlemci</th>
                    <th>RAM Kapasitesi</th>
                    <th>Bulunduğu Lab</th>
                </tr>
            </thead>
            <tbody id="pcTableBody">
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. Lab listesini dropdown'a çek
    async function loadLabs() {
        const res = await fetch("/api/admin/labs");
        const labs = await res.json();
        const select = document.getElementById("labSelect");
        select.innerHTML = '<option value="">Seçiniz...</option>' +
            labs.map(l => `<option value="${l.id}">${l.name}</option>`).join("");
    }

    // 2. Bilgisayarları listele
    async function loadComputers() {
        const res = await fetch("/api/bilgisayarlar");
        const pcs = await res.json();
        document.getElementById("pcTableBody").innerHTML = pcs.map(p => `
            <tr>
                <td class="ps-4 fw-bold text-primary">${p.assetCode}</td>
                <td class="fw-semibold">${p.brand}</td>
                <td><span class="badge bg-light text-dark">${p.processor}</span></td>
                <td><span class="badge bg-info text-dark">${p.ram} GB DDR4</span></td>
                <td><span class="badge bg-secondary">Lab ID: ${p.labId}</span></td>
            </tr>`).join("");
    }

    // 3. Yeni Bilgisayar Ekle
    async function addComputer() {
        const labId = document.getElementById("labSelect").value;
        const brand = document.getElementById("pcBrand").value;
        const cpu = document.getElementById("pcCpu").value;
        const ram = document.getElementById("pcRam").value;

        if (!labId || !brand || !cpu || !ram) {
            alert("Lütfen tüm alanları doldurun!");
            return;
        }

        const pcData = {
            labId: parseInt(labId),
            brand: brand,
            processor: cpu,
            ram: parseInt(ram)
        };

        const res = await fetch("/api/bilgisayar-ekle", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(pcData)
        });

        if (res.ok) {
            alert("Bilgisayar başarıyla sisteme kaydedildi.");
            // Formu temizle
            document.getElementById("pcBrand").value = "";
            document.getElementById("pcCpu").value = "";
            document.getElementById("pcRam").value = "";
            loadComputers();
        }
    }

    // Sayfa açıldığında verileri getir
    loadLabs();
    loadComputers();
</script>
